<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Update Admin Profile | JK Cart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    :root {
      --bg: #eef2ff;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --text: #111827;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-soft: rgba(37, 99, 235, 0.12);
      --border: rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 30%),
                  radial-gradient(circle at bottom right, rgba(99, 102, 241, 0.16), transparent 28%),
                  var(--bg);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }

    .page-shell {
      width: 100%;
      max-width: 560px;
    }

    .update-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 36px 32px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.08);
    }

    .update-card h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      text-align: center;
    }

    .update-card p.subtitle {
      margin: 0 0 28px;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }

    .alert-wrap {
      margin-bottom: 1rem;
    }

    .form-group label {
      font-weight: 700;
      color: #334155;
    }

    .form-control {
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--surface-soft);
      padding: 14px 16px;
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 0.2rem var(--primary-soft);
      background: #ffffff;
    }

    .profile-preview {
      width: 160px;
      height: 160px;
      margin: 0 auto 22px;
      object-fit: cover;
      border-radius: 22px;
      border: 1px solid var(--border);
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      background: var(--surface-soft);
    }

    .file-note {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .btn-submit {
      width: 100%;
      border-radius: 14px;
      padding: 14px;
      font-weight: 700;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      border: none;
      color: #fff;
      box-shadow: 0 14px 28px rgba(37, 99, 235, 0.22);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 32px rgba(37, 99, 235, 0.28);
    }

    .btn-back {
      width: 100%;
      margin-top: 12px;
      border-radius: 14px;
      border: 1px solid rgba(37, 99, 235, 0.2);
      color: var(--primary);
      background: transparent;
    }

    @media (max-width: 520px) {
      .update-card {
        padding: 26px 20px;
      }

      .profile-preview {
        width: 140px;
        height: 140px;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="update-card">
      <h1>JK Cart Admin</h1>
      <p class="subtitle">Update your profile details and admin photo so your account stays fresh and secure.</p>

      <form method="post" enctype="multipart/form-data" aria-label="Update admin profile">
        <img id="preview" src="/static/uploads/admin-default.png" alt="Admin profile image" class="profile-preview">

        <div class="mb-3">
          <label for="adminname" class="form-label">Admin Name</label>
          <input id="adminname" name="adminname" type="text" class="form-control" value="" placeholder="Enter admin name" required>
        </div>

        <div class="mb-3">
          <label for="address" class="form-label">Address</label>
          <input id="address" name="address" type="text" class="form-control" value="" placeholder="Enter address" required>
        </div>

        <div class="mb-3">
          <label for="ph_no" class="form-label">Phone Number</label>
          <input id="ph_no" name="ph_no" type="tel" class="form-control" value="" placeholder="Enter phone number" required>
        </div>

        <div class="mb-3">
          <label for="formFile" class="form-label">Upload New Image</label>
          <input class="form-control" type="file" id="formFile" name="file" accept="image/*">
          <span class="file-note">Optional: choose a new profile image for your admin account.</span>
        </div>

        <button type="submit" class="btn btn-submit">Save Changes</button>
        <a href="/admindashboard" class="btn btn-back">Back to Dashboard</a>
      </form>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('formFile');
    const previewImg = document.getElementById('preview');

    if (fileInput) {
      fileInput.addEventListener('change', (event) => {
        const file = event.target.files[0];
        if (!file) return;
        if (!file.type.startsWith('image/')) {
          alert('Please select a valid image file.');
          event.target.value = '';
          return;
        }
        const reader = new FileReader();
        reader.onload = (ev) => previewImg.src = ev.target.result;
        reader.readAsDataURL(file);
      });
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
