<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Add Review | JK Cart</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<style>
  :root {
    color-scheme: dark;
    font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  body {
    min-height: 100vh;
    margin: 0;
    background: #f4f7fb;
    color: #1f2937;
    display: grid;
    place-items: center;
    padding: 24px;
  }

  .container {
    width: min(100%, 720px);
    background: #ffffff;
    border-radius: 24px;
    box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
    overflow: hidden;
    border: 1px solid rgba(15, 23, 42, 0.05);
  }

  .hero {
    padding: 40px 40px 32px;
    background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
  }

  .hero h1 {
    margin: 0 0 10px;
    font-size: clamp(2rem, 2.5vw, 2.8rem);
    letter-spacing: -0.03em;
  }

  .hero p {
    margin: 0;
    color: #4b5563;
    line-height: 1.75;
    max-width: 44rem;
  }

  .form-panel {
    padding: 32px 40px 40px;
  }

  .form-label {
    color: #374151;
    font-weight: 600;
  }

  .form-control,
  .form-select,
  textarea {
    border-radius: 16px;
    border: 1px solid #e5e7eb;
    background: #f8fafc;
    color: #111827;
    padding: 16px 18px;
    box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.06);
  }

  .form-control:focus,
  .form-select:focus,
  textarea:focus {
    outline: none;
    border-color: #6366f1;
    box-shadow: 0 0 0 0.2rem rgba(99, 102, 241, 0.2);
    background: #ffffff;
  }

  .action-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    margin-top: 18px;
  }

  .btn-primary,
  .btn-secondary {
    border-radius: 14px;
    padding: 14px 24px;
    font-weight: 600;
  }

  .btn-primary {
    background: #4f46e5;
    border: 1px solid transparent;
    color: #ffffff;
  }

  .btn-primary:hover {
    background: #4338ca;
  }

  .btn-secondary {
    background: #eef2ff;
    border: 1px solid #c7d2fe;
    color: #4338ca;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    margin-bottom: 18px;
  }

  .topbar h3 {
    margin: 0;
    font-size: 1.1rem;
    letter-spacing: 0.02em;
    color: #0f172a;
  }

  .logo {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    border: 1px solid #e5e7eb;
    padding: 8px;
    background: #ffffff;
  }

  .title-bar {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 30px;
  }

  .title-bar small {
    color: #6b7280;
  }

  @media (max-width: 720px) {
    body {
      padding: 18px;
    }

    .hero,
    .form-panel {
      padding-left: 28px;
      padding-right: 28px;
    }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <div class="topbar">
        <div class="title-bar">
          <h1>Add Review</h1>
          <small>Share your thoughts with a short rating and review.</small>
        </div>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">Home</a>
      </div>
    </div>

    <div class="form-panel">
      <form method="post">
        <div class="mb-4">
          <label class="form-label" for="rating">Rating</label>
          <select id="rating" name="rating" class="form-select" required>
            <option value="">Select Rating</option>
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
            <option>5</option>
          </select>
        </div>

        <div class="mb-4">
          <label class="form-label" for="review_text">Review</label>
          <textarea id="review_text" name="review_text" class="form-control" rows="6" placeholder="Write your review here..." required></textarea>
        </div>

        <div class="action-row">
          <button type="submit" class="btn btn-primary">Submit Review</button>
          <a href="{{ url_for('descitem', itemid=itemid) }}" class="btn btn-secondary">Back</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
