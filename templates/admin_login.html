<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | jk cart</title>
    <style>
        :root {
            --bg: #f4f7ff;
            --card: #ffffff;
            --accent: #4f46e5;
            --accent-soft: rgba(79, 70, 229, 0.15);
            --text: #111827;
            --muted: #6b7280;
            --border: rgba(15, 23, 42, 0.08);
            --shadow: 0 28px 80px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, rgba(79, 70, 229, 0.18), transparent 22%),
                        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.14), transparent 20%),
                        linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%);
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 2rem;
        }

        .container {
            width: min(500px, 100%);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 28px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .hero {
            padding: 2.2rem 2rem 1.6rem;
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.96), rgba(99, 102, 241, 0.92));
            color: #ffffff;
        }

        .hero h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: -0.03em;
        }

        .hero p {
            margin: 0.9rem 0 0;
            color: rgba(255, 255, 255, 0.82);
            line-height: 1.7;
        }

        .card-body {
            padding: 2rem;
        }

        .field {
            margin-bottom: 1.35rem;
        }

        .field label {
            display: block;
            margin-bottom: 0.55rem;
            font-size: 0.95rem;
            color: var(--muted);
        }

        .field input {
            width: 100%;
            padding: 0.95rem 1rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: #f8fafc;
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .field input:focus {
            border-color: rgba(79, 70, 229, 0.55);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.12);
        }

        .button-row {
            display: grid;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn-primary {
            border: none;
            width: 100%;
            padding: 1rem 1.15rem;
            border-radius: 16px;
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.22s ease, box-shadow 0.22s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 32px rgba(79, 70, 229, 0.25);
        }

        .text-note {
            font-size: 0.95rem;
            text-align: center;
            color: var(--muted);
        }

        .text-note a {
            color: #4338ca;
            text-decoration: none;
            font-weight: 600;
        }

        .info-box {
            margin-top: 1.5rem;
            border: 1px solid rgba(79, 70, 229, 0.16);
            background: var(--accent-soft);
            padding: 1rem 1.1rem;
            border-radius: 18px;
            color: #3730a3;
            font-size: 0.95rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <section class="hero">
            <h1>Admin Login</h1>
            <p>Secure access to your jk cart admin dashboard with a clean and modern login experience.</p>
        </section>
        <div class="card-body">
            <form action="/adminlogin" method="post">
                <div class="field">
                    <label for="email">Email address</label>
                    <input id="email" name="email" type="email" placeholder="admin@jkcart.com" required />
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" placeholder="Enter your password" required />
                </div>
                <button class="btn-primary" type="submit">Login</button>
            </form>
            <p class="text-note">Need an admin account? <a href="/admincreate">Create one here</a> | <a href="{{ url_for('adminforgotpwd') }}">Forgot password?</a></p>
            <div class="info-box">For secure admin access, keep your credentials private and use a strong password.</div>
        </div>
    </div>
</body>
</html>
