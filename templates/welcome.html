<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JK Cart</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      position: relative;
      overflow: hidden;
      background: radial-gradient(circle at 15% 15%, rgba(138, 96, 255, 0.24), transparent 18%),
                  radial-gradient(circle at 85% 20%, rgba(64, 221, 255, 0.18), transparent 16%),
                  linear-gradient(150deg, #0a0f2b 0%, #1d2a57 35%, #092344 70%, #060f24 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 25% 18%, rgba(255, 255, 255, 0.16), transparent 15%),
                  radial-gradient(circle at 70% 30%, rgba(95, 235, 255, 0.14), transparent 12%),
                  radial-gradient(circle at 50% 85%, rgba(174, 75, 255, 0.12), transparent 18%);
      opacity: 0.92;
      pointer-events: none;
      animation: glow 12s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% {
        transform: scale(1) translate(0, 0);
        opacity: 0.9;
      }
      50% {
        transform: scale(1.03) translate(12px, -10px);
        opacity: 1;
      }
    }

    .hero {
      position: relative;
      max-width: 960px;
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 28px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.25);
      padding: 60px 48px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      margin-bottom: 22px;
    }

    .title {
      font-size: clamp(3rem, 6vw, 5rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
      margin-bottom: 18px;
    }

    .subtitle {
      max-width: 720px;
      font-size: 1.15rem;
      line-height: 1.75;
      margin-bottom: 34px;
      color: rgba(255, 255, 255, 0.88);
    }

    .shop-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 18px 32px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #ff7a18, #af1fff);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.2);
    }

    .shop-button:hover,
    .shop-button:focus {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
      filter: brightness(1.05);
    }

    .shop-button:active {
      transform: translateY(0) scale(0.99);
    }

    .highlight {
      color: #ffd93d;
    }

    @media (max-width: 720px) {
      .hero {
        padding: 36px 28px;
      }

      .title {
        font-size: 3.4rem;
      }

      .subtitle {
        font-size: 1rem;
      }

      .shop-button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="hero">
    <span class="badge">Welcome to JK Cart</span>
    <h1 class="title">Shop smarter, buy better.</h1>
    <p class="subtitle">Discover curated deals, premium products, and a shopping experience designed for style and speed. JK Cart brings the coolest ecommerce vibe straight to your screen.</p>
    <a href="{{ url_for('index') }}" class="shop-button">Shop Now</a>
  </main>
</body>
</html>
