<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Forgot Password | JK Cart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    :root {
      --text: #111827;
      --text-soft: #6b7280;
      --accent: #2563eb;
      --accent-soft: rgba(37, 99, 235, 0.12);
      --border: rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }

    body {
      background: linear-gradient(135deg, #eef2ff 0%, #f8fafc 50%, #f3e8ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 20px;
      color: var(--text);
      min-height: 100vh;
    }

    .forgot-wrapper {
      width: 100%;
      max-width: 480px;
    }

    .forgot-card {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.1);
    }

    .icon-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--accent-soft);
      display: grid;
      place-items: center;
      font-size: 2rem;
      margin: 0 auto 24px;
    }

    .forgot-card h1 {
      margin: 0 0 12px;
      font-size: 1.6rem;
      font-weight: 800;
      text-align: center;
    }

    .forgot-card .subtitle {
      margin: 0 0 32px;
      color: var(--text-soft);
      text-align: center;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      color: #374151;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .form-control {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 12px 14px;
      background: #f9fafb;
      color: var(--text);
      font-size: 0.95rem;
    }

    .form-control::placeholder {
      color: var(--text-soft);
    }

    .form-control:focus {
      outline: none;
      border-color: var(--accent);
      background: #ffffff;
      box-shadow: 0 0 0 0.2rem var(--accent-soft);
    }

    .btn-submit {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #ffffff;
      font-weight: 700;
      border: none;
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.24);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      font-size: 0.95rem;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 36px rgba(37, 99, 235, 0.32);
    }

    .back-link {
      text-align: center;
      margin-top: 20px;
    }

    .back-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .back-link a:hover {
      text-decoration: underline;
    }

    .info-box {
      background: rgba(37, 99, 235, 0.08);
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      padding: 12px 14px;
      margin-top: 24px;
      font-size: 0.88rem;
      color: var(--text-soft);
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .forgot-card {
        padding: 32px 24px;
      }

      .forgot-card h1 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>
  <div class="forgot-wrapper">
    <div class="forgot-card">
      <div class="icon-circle">🔑</div>
      
      <h1>Reset Your Password</h1>
      <p class="subtitle">Enter your email address and we'll send you a link to reset your password.</p>

      <form method="post" action="/userforgot">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            id="email" 
            name="email" 
            type="email" 
            class="form-control" 
            placeholder="you@example.com" 
            required 
            autofocus
          >
        </div>

        <button type="submit" class="btn-submit">Send Reset Link</button>

        <div class="info-box">
          💡 Check your email (including spam folder) for the reset link. It will expire in 24 hours.
        </div>
      </form>

      <div class="back-link">
        <a href="/userlogin">← Back to Sign In</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
