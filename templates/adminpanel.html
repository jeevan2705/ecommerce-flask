<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JK Cart Admin Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #ffffff;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top left, rgba(99, 102, 241, 0.16), transparent 28%),
                  radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.12), transparent 30%),
                  linear-gradient(180deg, #f8fafc 0%, #eef2ff 40%, #e2e8f0 100%);
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background: rgba(7, 18, 39, 0.92);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.16);
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #ffffff;
    }

    .navbar-brand img {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.06);
      padding: 6px;
    }

    .nav-link {
      color: rgba(255, 255, 255, 0.88) !important;
      font-weight: 500;
      margin-right: 8px;
    }

    .nav-link:hover,
    .nav-link.active {
      color: #9fdbff !important;
    }

    .search-input {
      width: 250px;
      max-width: 100%;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      padding: 10px 16px;
    }

    .search-input::placeholder {
      color: rgba(255, 255, 255, 0.55);
    }

    .search-btn {
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(63, 132, 255, 0.16);
      color: #ffffff;
      padding: 10px 18px;
      margin-left: 8px;
    }

    .main-panel {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 32px;
    }

    .welcome-box {
      width: min(100%, 760px);
      text-align: center;
      padding: 52px 42px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 28px;
      backdrop-filter: blur(18px);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.10);
      color: #111827;
    }

    .welcome-box h1 {
      margin: 0;
      font-size: clamp(2.4rem, 4vw, 3.6rem);
      font-weight: 800;
      letter-spacing: -0.05em;
      line-height: 1.05;
    }

    .welcome-box p {
      margin: 22px auto 0;
      max-width: 600px;
      color: rgba(17, 24, 39, 0.78);
      font-size: 1.02rem;
      line-height: 1.8;
    }

    .brand-highlight {
      display: inline-block;
      margin: 0.35rem 0;
      padding: 8px 18px;
      border-radius: 999px;
      background: rgba(79, 70, 229, 0.16);
      color: #dbeafe;
      letter-spacing: 0.08em;
      font-size: 1rem;
      font-weight: 700;
    }

    @media (max-width: 840px) {
      .navbar .d-flex {
        flex-direction: column;
        align-items: flex-start;
      }
      .search-input {
        width: 100%;
        margin-bottom: 10px;
      }
    }

    @media (max-width: 640px) {
      .welcome-box {
        padding: 36px 24px;
      }
      .navbar-nav {
        margin-top: 12px;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ url_for('admindashboard') }}">
        <img src="/jk-logo.jpg" alt="Logo">
        JK Cart Admin
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="{{ url_for('additem') }}">Add Item</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('viewallitems') }}">View All Items</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('adminprofileupdate') }}">Update Profile</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('adminlogout') }}">Logout</a>
          </li>
        </ul>
        <form class="d-flex align-items-center" method="get" action="#">
          <input class="search-input" type="search" name="search" placeholder="Search items..." aria-label="Search">
          <button class="search-btn" type="submit">Search</button>
        </form>
      </div>
    </div>
  </nav>

  <main class="main-panel">
    <section class="welcome-box">
      <p class="brand-highlight">Welcome to</p>
      <h1>JK Cart Admin Panel</h1>
      <p>Manage your store from one place. Add new items, view existing inventory, update your admin profile, or log out safely.</p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
