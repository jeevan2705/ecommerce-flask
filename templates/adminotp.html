<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JK Cart Admin OTP Verification</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      background: 
        radial-gradient(ellipse at 20% 80%, rgba(120, 80, 220, 0.25) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(60, 180, 220, 0.2) 0%, transparent 45%),
        radial-gradient(ellipse at 50% 50%, rgba(255, 140, 100, 0.12) 0%, transparent 60%),
        linear-gradient(160deg, #0f0c29 0%, #1a1a3e 40%, #24243e 100%);
      color: #edf2ff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page-shell {
      width: 100%;
      max-width: 480px;
      padding: 30px;
      box-sizing: border-box;
      position: relative;
    }

    .panel {
      position: relative;
      border-radius: 28px;
      background: rgba(14, 23, 61, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.24);
      overflow: hidden;
      padding: 40px 32px;
    }

    .panel::before,
    .panel::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(42px);
      opacity: 0.55;
    }

    .panel::before {
      width: 220px;
      height: 220px;
      top: -90px;
      right: -70px;
      background: rgba(107, 216, 255, 0.16);
    }

    .panel::after {
      width: 180px;
      height: 180px;
      bottom: -80px;
      left: -70px;
      background: rgba(255, 121, 97, 0.12);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .brand-logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #73c2ff, #ff8c66);
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: #0b1637;
      font-weight: 800;
      font-size: 1.15rem;
      letter-spacing: 0.04em;
      box-shadow: 0 12px 24px rgba(115, 194, 255, 0.22);
    }

    .brand-title {
      font-size: 1.35rem;
      margin: 0;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .brand-subtitle {
      margin: 2px 0 0;
      font-size: 0.95rem;
      color: #c7d2ff;
    }

    .panel h1 {
      margin: 0;
      font-size: 1.75rem;
      letter-spacing: -0.03em;
      color: #f8fbff;
    }

    .panel p {
      margin: 14px 0 28px;
      line-height: 1.65;
      color: #c8d0ff;
    }

    .otp-field {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 26px;
    }

    .otp-field input {
      width: 100%;
      padding: 18px 0;
      text-align: center;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      color: #f8fbff;
      font-size: 1.35rem;
      outline: none;
      transition: border-color 0.2s ease, transform 0.2s ease;
    }

    .otp-field input:focus {
      border-color: #72c6ff;
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.12);
    }

    .submit-btn {
      width: 100%;
      padding: 14px 18px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #4f8fff, #89e0ff);
      color: #0b1732;
      font-weight: 700;
      letter-spacing: 0.04em;
      box-shadow: 0 18px 30px rgba(79, 143, 255, 0.22);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 34px rgba(79, 143, 255, 0.28);
    }

    .note {
      margin-top: 18px;
      font-size: 0.92rem;
      color: #b8c2ff;
    }

    .resend-link {
      margin-top: 16px;
      text-align: center;
      display: grid;
      gap: 10px;
    }

    .resend-link p {
      margin: 0;
      color: #c8d0ff;
      font-size: 0.95rem;
    }

    .resend-link a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 260px;
      margin: 0 auto;
      padding: 12px 18px;
      border-radius: 16px;
      background: rgba(255,255,255,0.08);
      color: #e8f1ff;
      border: 1px solid rgba(255,255,255,0.18);
      font-weight: 700;
      text-decoration: none;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .resend-link a:hover {
      background: rgba(255,255,255,0.12);
      transform: translateY(-1px);
    }

    .resend-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      margin-top: 12px;
      padding: 12px 18px;
      border-radius: 16px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.28);
      color: #d8e2ff;
      font-weight: 700;
      text-decoration: none;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .resend-btn:hover {
      background: rgba(255,255,255,0.08);
      transform: translateY(-1px);
    }

    .flash-msg {
      margin-bottom: 18px;
      padding: 12px 16px;
      border-radius: 14px;
      background: rgba(255, 95, 95, 0.16);
      border: 1px solid rgba(255, 95, 95, 0.22);
      color: #ffe5e5;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="panel">
      <div class="brand">
        <div class="brand-logo">JK</div>
        <div>
          <p class="brand-title">JK Cart</p>
          <p class="brand-subtitle">Admin signup verification</p>
        </div>
      </div>

      <h1>Admin Signup OTP</h1>
      <p>Enter the 6-character OTP</p>

      <form method="post">
        <div class="otp-field">
          <input type="text" inputmode="text" pattern="[A-Z]" maxlength="1" class="otp-input" name="otp1" autocomplete="off" required>
          <input type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" class="otp-input" name="otp2" autocomplete="off" required>
          <input type="text" inputmode="text" pattern="[a-z]" maxlength="1" class="otp-input" name="otp3" autocomplete="off" required>
          <input type="text" inputmode="text" pattern="[A-Z]" maxlength="1" class="otp-input" name="otp4" autocomplete="off" required>
          <input type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" class="otp-input" name="otp5" autocomplete="off" required>
          <input type="text" inputmode="text" pattern="[a-z]" maxlength="1" class="otp-input" name="otp6" autocomplete="off" required>
        </div>
        <button type="submit" class="submit-btn">Verify OTP</button>
      </form>

      <div class="resend-link">
        <p>Didn't receive the OTP?</p>
        <a href="{{ url_for('resend_adminotp', serverdata=serverdata) }}">Resend OTP</a>
      </div>
    </div>
  </div>

  <script>
    const inputs = document.querySelectorAll('.otp-input');
    const patterns = ['[A-Z]', '[0-9]', '[a-z]', '[A-Z]', '[0-9]', '[a-z]'];
    const placeholders = ['U', 'N', 'L', 'U', 'N', 'L'];

    inputs.forEach((input, index) => {
      input.addEventListener('input', () => {
        let value = input.value;
        if (index % 3 === 0) { // Uppercase
          value = value.replace(/[^A-Z]/g, '').toUpperCase();
        } else if (index % 3 === 1) { // Numeric
          value = value.replace(/[^0-9]/g, '');
        } else { // Lowercase
          value = value.replace(/[^a-z]/g, '').toLowerCase();
        }
        input.value = value;
        if (value && index < inputs.length - 1) {
          inputs[index + 1].focus();
        }
      });

      input.addEventListener('keydown', (event) => {
        if (event.key === 'Backspace' && !input.value && index > 0) {
          inputs[index - 1].focus();
        }
      });

      input.addEventListener('paste', (event) => {
        event.preventDefault();
        const pasted = event.clipboardData.getData('text');
        let validChars = '';
        for (let i = 0; i < pasted.length && index + validChars.length < inputs.length; i++) {
          const char = pasted[i];
          const pat = new RegExp(patterns[index + validChars.length]);
          if (pat.test(char)) {
            validChars += char;
          }
        }
        for (let i = 0; i < validChars.length; i++) {
          if (index + i < inputs.length) {
            inputs[index + i].value = validChars[i];
          }
        }
        const nextIndex = Math.min(index + validChars.length, inputs.length - 1);
        inputs[nextIndex].focus();
      });
    });
  </script>
</body>
</html>
