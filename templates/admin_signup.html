<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Signup | jk cart</title>
    <style>
        :root {
            --bg: #edf2ff;
            --card: #ffffff;
            --accent: #0f172a;
            --accent-soft: rgba(59, 130, 246, 0.1);
            --text: #101828;
            --muted: #475569;
            --border: rgba(15, 23, 42, 0.12);
            --shadow: 0 32px 80px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #f8fbff 0%, #eef2ff 100%);
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 2rem;
        }

        .container {
            width: min(540px, 100%);
            background: var(--card);
            border-radius: 28px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .hero {
            padding: 2.2rem 2rem 1.6rem;
            background: #0f172a;
            color: white;
        }

        .hero h1 {
            margin: 0;
            font-size: 2rem;
        }

        .hero p {
            margin-top: 0.85rem;
            color: rgba(255, 255, 255, 0.78);
            line-height: 1.7;
        }

        .card-body {
            padding: 2rem;
        }

        .field {
            margin-bottom: 1.25rem;
        }

        .field label {
            display: block;
            margin-bottom: 0.55rem;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .field input {
            width: 100%;
            padding: 0.95rem 1rem;
            border-radius: 15px;
            border: 1px solid var(--border);
            background: #f8fafc;
            color: var(--text);
            font-size: 1rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .field input:focus {
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
        }

        .button-row {
            display: grid;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn-primary {
            width: 100%;
            padding: 1rem 1.15rem;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.22s ease, box-shadow 0.22s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 32px rgba(59, 130, 246, 0.24);
        }

        .text-note {
            margin-top: 1.35rem;
            text-align: center;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .text-note a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
        }

        .pill-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-top: 1.6rem;
        }

        .pill {
            background: var(--accent-soft);
            border-radius: 999px;
            padding: 0.75rem 1rem;
            color: #0f172a;
            font-size: 0.9rem;
            border: 1px solid rgba(59, 130, 246, 0.16);
        }
    </style>
</head>
<body>
    <div class="container">
        <section class="hero">
            <h1>Admin Signup</h1>
            <p>Create your jk cart admin account with a clear and friendly form designed for fast onboarding.</p>
        </section>
        <div class="card-body">
            <form action="/admincreate" method="post">
                <div class="field">
                    <label for="name">Full name</label>
                    <input id="name" name="name" type="text" placeholder="Admin name" required />
                </div>
                <div class="field">
                    <label for="email">Email address</label>
                    <input id="email" name="email" type="email" placeholder="admin@jkcart.com" required />
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" placeholder="Choose a strong password" required />
                </div>
                <button class="btn-primary" type="submit">Sign Up</button>
                <a href="{{url_for('index')}}">Back to Home</a>
            </form>
            <p class="text-note">Already have an admin account? <a href="/adminlogin">Login instead</a></p>
            <div class="pill-list">
                <span class="pill">Easy setup</span>
                <span class="pill">Secure access</span>
                <span class="pill">Admin-ready UI</span>
            </div>
        </div>
    </div>
</body>
</html>
